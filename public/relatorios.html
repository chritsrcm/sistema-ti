<!DOCTYPE html>
<html>
<head>
  <title>Relatórios</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 40%, #020617 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Canvas de fundo */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Efeitos de brilho no fundo */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      top: -150px;
      left: -150px;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      bottom: -100px;
      right: -100px;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Container principal */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      font-size: 24px;
      margin-bottom: 25px;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      padding-bottom: 15px;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
    }

    /* Grid system */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Cards */
    .card {
      background: linear-gradient(145deg, rgba(2,6,23,0.95), rgba(15,23,42,0.9));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-metrica {
      background: linear-gradient(145deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9));
    }

    .card-titulo {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .numero {
      font-size: 36px;
      font-weight: 800;
      color: #3b82f6;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
      transition: transform 0.2s;
    }

    .card:hover .numero {
      transform: scale(1.05);
    }

    .numero.verde {
      color: #10b981;
      text-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
    }

    .numero.amarelo {
      color: #f59e0b;
      text-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
    }

    /* Boxes de gráfico */
    .grafico-box {
      height: 350px;
      position: relative;
      background: linear-gradient(145deg, rgba(2,6,23,0.95), rgba(15,23,42,0.9));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .grafico-box:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .grafico-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.5), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .grafico-box:hover::before {
      opacity: 1;
    }

    h3 {
      margin-bottom: 15px;
      font-size: 16px;
      color: #f1f5f9;
      font-weight: 600;
      position: relative;
      padding-bottom: 10px;
    }

    h3::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: rgba(59, 130, 246, 0.5);
      border-radius: 2px;
    }

    .grafico-box canvas {
      width: 100% !important;
      height: calc(100% - 30px) !important;
    }

    /* Filtros de período */
    .filtros-periodo {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      padding: 8px;
      background: rgba(2, 6, 23, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(30, 41, 59, 0.6);
      width: fit-content;
    }

    .filtros-periodo button {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.8);
      padding: 10px 20px;
      border-radius: 10px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .filtros-periodo button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }

    .filtros-periodo button:hover::before {
      left: 100%;
    }

    .filtros-periodo button:hover {
      background: rgba(59, 130, 246, 0.2);
      color: #e2e8f0;
      border-color: #3b82f6;
      transform: translateY(-2px);
    }

    .filtros-periodo button.ativo {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-color: transparent;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    .filtros-periodo button.ativo:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
    }

    #resumo { margin-bottom: 20px; }
    #resumo .card { min-width: 200px; }
    .tempo-medio { grid-column: 1 / -1; }

    /* Botão voltar */
    .btn-voltar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #475569, #64748b);
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      margin: 25px 0 15px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-voltar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn-voltar:hover::before {
      left: 100%;
    }

    .btn-voltar:hover {
      background: linear-gradient(135deg, #64748b, #94a3b8);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px rgba(100, 116, 139, 0.5);
    }

    .btn-voltar:active {
      transform: translateY(0);
    }

    /* Scrollbar personalizado */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(2, 6, 23, 0.5);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 4px;
      transition: background 0.2s;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.6);
    }

    /* Responsivo */
    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .numero {
        font-size: 28px;
      }

      .grafico-box {
        height: 300px;
      }

      .filtros-periodo {
        width: 100%;
        justify-content: center;
      }

      h2 {
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .card, .grafico-box {
        padding: 16px;
        border-radius: 14px;
      }

      .numero {
        font-size: 24px;
      }

      .filtros-periodo button {
        padding: 8px 16px;
        font-size: 13px;
      }

      .btn-voltar {
        width: 100%;
        justify-content: center;
      }
    }

    /* Acessibilidade */
    button:focus-visible,
    .btn-voltar:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Utilitários */
    .hidden { display: none !important; }
  </style>
</head>

<body>

<!-- Canvas de fundo para partículas -->
<canvas id="bg"></canvas>

<div class="container">
  <h2>📊 Dashboard de Chamados</h2>

  <!-- RESUMO -->
  <div class="grid" id="resumo">
    <div class="card card-metrica">
      <div class="card-titulo">Total</div>
      <div class="numero">1</div>
    </div>
    <div class="card card-metrica">
      <div class="card-titulo">Fechados</div>
      <div class="numero verde">0</div>
    </div>
    <div class="card card-metrica">
      <div class="card-titulo">Abertos</div>
      <div class="numero amarelo">1</div>
    </div>
    <div class="card card-metrica tempo-medio">
      <div class="card-titulo">Tempo Médio</div>
      <div class="numero" style="font-size: 24px;">-</div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filtros-periodo">
    <button onclick="aplicarPeriodo(7)" class="ativo">7 dias</button>
    <button onclick="aplicarPeriodo(30)">30 dias</button>
    <button onclick="aplicarPeriodo(180)">6 meses</button>
    <button onclick="aplicarPeriodo(365)">1 ano</button>
  </div>

  <!-- GRÁFICOS -->
  <div class="grid">
    <div class="grafico-box">
      <h3>Status</h3>
      <canvas id="graficoStatus"></canvas>
    </div>

    <div class="grafico-box">
      <h3>Prioridade</h3>
      <canvas id="graficoPrioridade"></canvas>
    </div>

    <div class="grafico-box">
      <h3>Chamados por Técnico</h3>
      <canvas id="graficoTecnico"></canvas>
    </div>

    <div class="grafico-box">
      <h3>Chamados por Mês</h3>
      <canvas id="graficoMensal"></canvas>
    </div>
  </div>

  <button class="btn-voltar" onclick="window.location.href='dashboard.html'">
    ⬅ Voltar para Dashboard
  </button>
</div>

<!-- SEU SCRIPT ORIGINAL - ABSOLUTAMENTE INTACTO -->
<script>

let chamadosGlobal = [];
let periodoAtual = 30;
let chartStatus, chartPrioridade, chartMensal, chartTecnico;

async function carregarRelatorios() {

  const token = localStorage.getItem("token");

  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });

  const chamados = await res.json();

  if (!chamados.length) return;

  let abertos = 0, andamento = 0, fechados = 0;
  let normal = 0, atencao = 0, urgente = 0;

  let totalTempo = 0;
  let totalFechados = 0;

  const tecnicoMap = {};

  chamados.forEach(c => {

    const status = (c.status || "").toLowerCase();

    // STATUS
    if (status === "aberto") abertos++;
    if (status === "andamento") andamento++;
    if (status === "fechado") fechados++;

    // PRIORIDADE
    const criado = new Date(c.criadoEm || c.createdAt);
    const agora = new Date();

    const limite = new Date(criado);
    limite.setDate(limite.getDate() + 3);

    const dias = Math.ceil((limite - agora) / (1000*60*60*24));

    if (status !== "fechado") {
      if (dias < 1) urgente++;
      else if (dias <= 2) atencao++;
      else normal++;
    }

    // TEMPO MÉDIO
    if (status === "fechado") {
      const fechado = new Date(c.updatedAt);
      const diff = Math.ceil((fechado - criado) / (1000*60*60*24));

      totalTempo += diff;
      totalFechados++;
    }

    // POR TÉCNICO
    const nomeTec = c.tecnico?.nome || "Não atribuído";

    tecnicoMap[nomeTec] = (tecnicoMap[nomeTec] || 0) + 1;
  });

  // 🔥 CARDS
  document.getElementById("resumo").innerHTML = `
    <div class="card"><h3>Total</h3><div class="numero">${chamados.length}</div></div>
    <div class="card"><h3>Fechados</h3><div class="numero">${fechados}</div></div>
    <div class="card"><h3>Abertos</h3><div class="numero">${abertos}</div></div>
    <div class="cardm"><h3>Tempo Médio</h3><div class="numero">
      ${totalFechados ? Math.round(totalTempo / totalFechados) + " dias" : "-"}
    </div></div>
  `;


  criarGraficoTecnico(
    Object.keys(tecnicoMap),
    Object.values(tecnicoMap)
  );

  const meses = Array(12).fill(0);

chamados.forEach(c => {
  const data = new Date(c.criadoEm || c.createdAt);
  const mes = data.getMonth(); // 0 a 11
  meses[mes]++;
});
criarGraficoMensal(meses);
chamadosGlobal = chamados;
aplicarPeriodo(periodoAtual);

}

function criarGraficoStatus(a, b, c) {

  if (chartStatus) chartStatus.destroy();

  chartStatus = new Chart(document.getElementById("graficoStatus"), {
    type: "doughnut",
    data: {
      labels: ["Abertos","Andamento","Fechados"],
      datasets:[{ data:[a,b,c] }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: "top" }
      }
    }
  });
}

function criarGraficoTecnico(labels, data) {

  if (chartTecnico) chartTecnico.destroy();

  chartTecnico = new Chart(document.getElementById("graficoTecnico"), {
    type: "bar",
    data: {
      labels,
      datasets:[{ label:"Chamados", data }]
    },
    options: {
      responsive:true,
      maintainAspectRatio:false
    }
  });
}

carregarRelatorios();

function criarGraficoMensal(dados) {

  if (chartMensal) chartMensal.destroy();

  chartMensal = new Chart(document.getElementById("graficoMensal"), {
    type: "line",
    data: {
      labels: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
      datasets: [{
        label: "Chamados",
        data: dados,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

function aplicarPeriodo(dias) {

  periodoAtual = dias;

  const agora = new Date();

  const filtrados = chamadosGlobal.filter(c => {
    const data = new Date(c.criadoEm || c.createdAt);

    const diff = (agora - data) / (1000 * 60 * 60 * 24);

    return diff <= dias;
  });

  atualizarGraficos(filtrados);
}

function atualizarGraficos(chamados) {

  let abertos = 0, andamento = 0, fechados = 0;
  let normal = 0, atencao = 0, urgente = 0;

  const meses = Array(12).fill(0);
  const tecnicoMap = {};

  chamados.forEach(c => {

    const nomeTec = c.tecnico?.nome || "Não atribuído";
    tecnicoMap[nomeTec] = (tecnicoMap[nomeTec] || 0) + 1;

    const status = (c.status || "").toLowerCase();

    if (status === "aberto") abertos++;
    if (status === "andamento") andamento++;
    if (status === "fechado") fechados++;

    // prioridade
    const criado = new Date(c.criadoEm || c.createdAt);
    const agora = new Date();

    const limite = new Date(criado);
    limite.setDate(limite.getDate() + 3);

    const diasRestantes = Math.ceil((limite - agora) / (1000*60*60*24));

    if (status !== "fechado") {
      if (diasRestantes < 1) urgente++;
      else if (diasRestantes <= 2) atencao++;
      else normal++;
    }

    // mensal
    const mes = criado.getMonth();
    meses[mes]++;
  });

  // 🔥 AQUI QUE FALTAVA
  criarGraficoStatus(abertos, andamento, fechados);
  criarGraficoPrioridade(normal, atencao, urgente);
  criarGraficoMensal(meses);

  criarGraficoTecnico(
    Object.keys(tecnicoMap),
    Object.values(tecnicoMap)
  );
}

function criarGraficoPrioridade(n, a, u) {

  if (chartPrioridade) chartPrioridade.destroy();

  chartPrioridade = new Chart(document.getElementById("graficoPrioridade"), {
    type: "bar",
    data: {
      labels:["Normal","Atenção","Urgente"],
      datasets:[{ data:[n,a,u] }]
    },
    options: {
      responsive:true,
      maintainAspectRatio:false
    }
  });
}

function aplicarPeriodo(dias) {

  periodoAtual = dias;

  const agora = new Date();

  const filtrados = chamadosGlobal.filter(c => {
    const data = new Date(c.criadoEm || c.createdAt);
    const diff = (agora - data) / (1000 * 60 * 60 * 24);
    return diff <= dias;
  });

  // 🔥 SE NÃO TIVER DADOS → USA TODOS
  if (filtrados.length === 0) {
    atualizarGraficos(chamadosGlobal);
  } else {
    atualizarGraficos(filtrados);
  }
}

function voltarDashboard() {
  window.location.href = "dashboard.html";
}

</script>

<!-- Script das partículas de fundo (consistente com outras páginas) -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#60a5fa";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

async function protegerPagina() {
  const token = localStorage.getItem("token");

  const res = await fetch("/perfil", {
    headers: { Authorization: "Bearer " + token }
  });

  const user = await res.json();

  if (user.role === "usuario") {
    alert("Acesso restrito");
    window.location.href = "dashboard.html";
  }
}

protegerPagina();

</script>

</body>
</html>
