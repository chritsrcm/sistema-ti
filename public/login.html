<!-- ============================================================================
  DOCUMENTO HTML: PÁGINA DE LOGIN DO SISTEMA
  Interface de autenticação com validação, animações e integração com API
============================================================================ -->
<!DOCTYPE html>
<html>
<head>
  <!-- Metadados e título da página -->
  <title>Login</title>
  
  <!-- Font Awesome para ícones (opcional, usado para toggle de senha) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Link para folha de estilos externa (estilos globais do sistema) -->
  <link rel="stylesheet" href="style.css">
  
  <!-- ========================================================================
    ESTILOS INTERNOS: CSS específico da página de login
    Inclui reset, layout, animações, componentes e responsividade
  ======================================================================== -->
  <style>
    /* Reset básico de margens e box-sizing para consistência entre navegadores */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Configuração do corpo: centralização, fundo com gradiente e overflow controlado */
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 40%, #020617 100%);
      color: #e2e8f0;
      position: relative;
    }

    /* Canvas de fundo: elemento para animação de partículas, sem interatividade */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Efeitos de brilho flutuante no fundo com animação suave */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      top: -150px;
      left: -150px;
      animation-delay: 0s;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      bottom: -120px;
      right: -120px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Wrapper central: container para logo e formulário com animação de entrada */
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 40px;
      position: relative;
      z-index: 1;
      padding: 20px;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo com gradiente animado e efeito de texto recortado */
    .logo {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6, #8b5cf6, #60a5fa);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 5s ease infinite;
      text-align: center;
      text-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
      position: relative;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      border-radius: 2px;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Caixa de login: estilo glassmorphism com bordas, sombra e detalhe superior */
    .login-box {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      background: linear-gradient(145deg, rgba(2,6,23,0.95), rgba(15,23,42,0.9));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 40px 35px;
      border-radius: 24px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-top-color: rgba(59, 130, 246, 0.4);
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 0 60px rgba(59, 130, 246, 0.1);
      animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: scale(0.98) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #3b82f6, #8b5cf6, transparent);
      border-radius: 0 0 12px 12px;
    }

    .login-box h2 {
      margin: 0 0 28px;
      text-align: center;
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      position: relative;
    }

    .login-box h2::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: rgba(59, 130, 246, 0.5);
      border-radius: 2px;
    }

    /* Grupos de input: estrutura para campos com ícones e estados de foco */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 45px 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(30, 41, 59, 0.9);
      background: rgba(2, 6, 23, 0.8);
      color: #e2e8f0;
      font-size: 15px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .input-group input::placeholder {
      color: #64748b;
      font-weight: 400;
    }

    .input-group input:focus {
      border-color: #3b82f6;
      background: rgba(2, 6, 23, 1);
      box-shadow: 
        0 0 0 4px rgba(59, 130, 246, 0.15),
        0 8px 25px rgba(0, 0, 0, 0.3);
      transform: translateY(-1px);
    }

    /* Ícone de toggle para visibilidade da senha */
    .input-group span {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #64748b;
      font-size: 18px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .input-group span:hover {
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }

    /* Linha de opções: checkbox "Lembrar de mim" e link de recuperação */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin: 8px 0 22px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }

    .options label:hover {
      color: #cbd5e1;
    }

    .options input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .options a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
      position: relative;
    }

    .options a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: currentColor;
      transition: width 0.2s;
    }

    .options a:hover {
      color: #3b82f6;
    }

    .options a:hover::after {
      width: 100%;
    }

    /* Botão principal: gradiente, efeito de brilho ao hover e estado de loading */
    button {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
      margin-top: 4px;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 12px 35px -10px rgba(59, 130, 246, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    button:active {
      transform: translateY(0);
    }

    /* Estado de loading: desabilita interatividade visual durante requisição */
    button.loading {
      background: linear-gradient(135deg, #1e293b, #334155);
      cursor: wait;
      opacity: 0.95;
    }

    button.loading:hover {
      transform: none;
      box-shadow: none;
    }

    button.loading::before {
      display: none;
    }

    /* Mensagem de erro: exibição com animação de shake para chamar atenção */
    #msg {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      color: #f87171;
      font-weight: 500;
      min-height: 20px;
      animation: shake 0.3s ease;
      padding: 0 8px;
    }

    #msg:empty {
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }

    /* Links inferiores: área para criação de nova conta */
    .links {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      padding-top: 20px;
      border-top: 1px solid rgba(30, 41, 59, 0.5);
    }

    .links a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      position: relative;
    }

    .links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: currentColor;
      transition: width 0.2s;
    }

    .links a:hover {
      color: #3b82f6;
    }

    .links a:hover::after {
      width: 100%;
    }

    /* Media query para responsividade em mobile */
    @media (max-width: 480px) {
      .wrapper { gap: 30px; padding: 16px; }
      .logo { font-size: 32px; letter-spacing: 2px; }
      .login-box { padding: 32px 28px; border-radius: 20px; }
      .login-box h2 { font-size: 20px; margin-bottom: 24px; }
      .input-group input { padding: 13px 42px 13px 15px; font-size: 14px; }
      button { padding: 13px 18px; font-size: 14px; }
    }

    /* Acessibilidade: foco visível para navegação via teclado */
    input:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Animação utilitária de entrada para o container de login */
    .login-box { animation: fadeIn 0.5s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.02); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<!-- ============================================================================
  CORPO DA PÁGINA: ESTRUTURA VISUAL DO FORMULÁRIO DE LOGIN
============================================================================ -->
<body>

<!-- Canvas para animação de fundo (partículas) -->
<canvas id="bg"></canvas>

<!-- Wrapper central: organiza logo e formulário verticalmente -->
<div class="wrapper">
  <h1 class="logo">⚡ CJSISTEMAS</h1>

  <!-- Caixa de login: container do formulário com campos e ações -->
  <div class="login-box">
    <h2>Bem-vindo de volta</h2>

    <!-- Campo de email com autocomplete para preenchimento automático -->
    <div class="input-group">
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <!-- Campo de senha com toggle de visibilidade e autocomplete -->
    <div class="input-group">
      <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
      <span onclick="toggleSenha()">👁️</span>
    </div>

    <!-- Opções: checkbox "Lembrar de mim" e link de recuperação de senha -->
    <div class="options">
      <label><input type="checkbox"> Lembrar de mim</label>
      <a href="reset.html">Esqueceu a senha?</a>
    </div>

    <!-- Botão de login: aciona função login() -->
    <button id="btn" onclick="login()">🚀 Entrar</button>

    <!-- Área para exibição de mensagens de erro ou feedback -->
    <p id="msg"></p>

    <!-- Link para página de registro de nova conta -->
    <div class="links">
      <p>Não tem conta? <a href="register.html">Criar conta gratuita</a></p>
    </div>
  </div>
</div>

<!-- ============================================================================
  JAVASCRIPT: LÓGICA DE AUTENTICAÇÃO E ANIMAÇÃO DE FUNDO
============================================================================ -->
<script>
// Função principal: valida campos, envia credenciais para API e gerencia redirecionamento
async function login() {
  // Captura valores dos campos de email e senha
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");

  // Limpa mensagem anterior antes de nova tentativa
  msg.innerText = "";

  // Atualiza estado visual do botão para indicar processamento
  btn.innerText = "Entrando...";
  btn.classList.add("loading");

  // Requisição POST para endpoint de login com corpo JSON e headers apropriados
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  // Tratamento de erro: exibe mensagem da API e restaura estado do botão
  if (res.status !== 200) {
    msg.innerText = data.error;
    btn.innerText = "Entrar";
    btn.classList.remove("loading");
    return;
  }

  // Sucesso: armazena token JWT no localStorage para autenticação nas próximas requisições
  localStorage.setItem("token", data.token);

  // Animação de transição: reduz opacidade do corpo antes do redirecionamento
  document.body.style.opacity = "0";

  // Redireciona para dashboard após breve delay para suavizar a transição visual
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 400);
}

// Função para alternar visibilidade do campo de senha (texto/password)
function toggleSenha() {
  const input = document.getElementById("senha");
  input.type = input.type === "password" ? "text" : "password";
}

// ============================================================================
// ANIMAÇÃO DE FUNDO: CANVAS COM PARTÍCULAS FLUTUANTES
// ============================================================================

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

// Define dimensões do canvas conforme tamanho da janela
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Array para armazenar objetos que representam as partículas
let particles = [];

// Inicializa 80 partículas com posição, tamanho e velocidade aleatórios
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5
  });
}

// Loop de animação: limpa canvas, atualiza posição das partículas e redesenha
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    // Inverte direção ao atingir bordas do canvas para efeito de quique suave
    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#3b82f6";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

// Inicia o loop de animação
animate();
</script>

</body>
</html>
