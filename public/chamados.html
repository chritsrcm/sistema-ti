<!DOCTYPE html>
<html>
<head>
  <title>Novo Chamado</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;

  background: radial-gradient(circle at top, #0f172a, #020617);
  overflow: hidden;
}

/* canvas fundo */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* animação entrada */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* caixa */
.box {
  width: 420px;

  background: rgba(2,6,23,0.9);
  backdrop-filter: blur(8px);

  padding: 30px;
  border-radius: 14px;
  border: 1px solid #1e293b;

  box-shadow: 0 20px 60px rgba(0,0,0,0.7);

  animation: fadeIn 0.5s ease;
}

.box h2 {
  margin-bottom: 20px;
  font-weight: 600;
  text-align: center;
}

/* inputs */
.input-group {
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-size: 13px;
  margin-bottom: 5px;
  color: #94a3b8;
}

.input-group input,
.input-group textarea,
.input-group select {
  width: 100%;
  padding: 12px;

  border-radius: 8px;
  border: 1px solid #1e293b;

  background: #020617;
  color: white;

  transition: 0.2s;
}

/* textarea */
.input-group textarea {
  resize: none;
  height: 100px;
}

/* foco bonito */
.input-group input:focus,
.input-group textarea:focus,
.input-group select:focus {
  border-color: #3b82f6;
  outline: none;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

/* botão principal */
button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;

  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  font-weight: bold;

  margin-top: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-1px);
}

/* loading */
button.loading {
  background: #1e293b;
  cursor: not-allowed;
}

/* botão voltar */
.voltar {
  background: transparent;
  border: 1px solid #1e293b;
}

.voltar:hover {
  background: #1e293b;
}

/* mensagem */
#msg {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  color: #ef4444;
}

#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}
  </style>

</head>
<body>

<canvas id="bg"></canvas>

<div class="box">

  <h2>Novo Chamado</h2>

  <!-- TÍTULO -->
  <div class="input-group">
    <label>Título</label>
    <input type="text" id="titulo" placeholder="Digite o título do problema">
  </div>

  <!-- CATEGORIA -->
  <div class="input-group">
    <label>Categoria</label>
    <select id="categoria">
      <option value="">Selecione uma categoria</option>
      <option value="Hardware">Hardware</option>
      <option value="Software">Software</option>
      <option value="Rede">Rede</option>
      <option value="Impressora">Impressora</option>
      <option value="Outro">Outro</option>
    </select>
  </div>

  <!-- DESCRIÇÃO -->
  <div class="input-group">
    <label>Descrição</label>
    <textarea id="descricao" placeholder="Descreva o problema..." rows="4"></textarea>
  </div>
<!-- EMPRESA -->
<div class="input-group">
  <label>Empresa</label>
  <input type="text" id="empresa" placeholder="Nome da empresa">
</div>

<!-- SETOR -->
<div class="input-group">
  <label>Setor</label>
  <input type="text" id="setor" placeholder="Ex: Financeiro, TI, RH">
</div>

<!-- ANEXO -->
<div class="input-group">
  <label>Anexo</label>
  <input type="file" id="arquivo">
</div>

  <!-- BOTÃO -->
  <button id="btn" onclick="criarChamado()">Enviar Chamado</button>

  <!-- MENSAGEM -->
  <p id="msg"></p>

  <!-- VOLTAR -->
  <button class="voltar" onclick="voltar()">Voltar</button>

</div>

<script>

function gerarNumeroChamado() {
  return "CH-" + Date.now();
}

async function criarChamado() {

  const titulo = document.getElementById("titulo").value;
  const descricao = document.getElementById("descricao").value;
  const categoria = document.getElementById("categoria").value;
  const empresa = document.getElementById("empresa").value;
  const setor = document.getElementById("setor").value;
  const arquivo = document.getElementById("arquivo").files[0];

  const token = localStorage.getItem("token");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");

  if (!titulo || !descricao) {
    msg.innerText = "Preencha todos os campos!";
    return;
  }

  btn.innerText = "Enviando...";
  btn.classList.add("loading");

  const formData = new FormData();

  formData.append("titulo", titulo);
  formData.append("descricao", descricao);
  formData.append("categoria", categoria || "Outro");
  formData.append("empresa", empresa);
  formData.append("setor", setor);
  formData.append("numero", gerarNumeroChamado());

  if (arquivo) {
    formData.append("arquivo", arquivo);
  }

  const res = await fetch("/chamados", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    },
    body: formData
  });

  const data = await res.json();

  if (res.status !== 200) {
    msg.innerText = data.error;
    btn.innerText = "Enviar Chamado";
    btn.classList.remove("loading");
    return;
  }

  msg.innerText = "Chamado criado com sucesso!";

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 800);
}

function voltar() {
  window.location.href = "dashboard.html";
}



const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.5,
    speed: Math.random() * 0.3
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    star.y += star.speed;

    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

/* responsivo */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
