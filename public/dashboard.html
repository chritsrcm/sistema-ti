<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <style>

    body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  overflow-x: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* fundo */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* topo */
.topbar {
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 20px;

  background: rgba(2,6,23,0.8);
  border-bottom: 1px solid #1e293b;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(90deg, #3b82f6, #9333ea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* layout geral */

/* sidebar */
.sidebar {
  width: 240px;
  min-width: 240px;

  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 20px;
}
.sidebar button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
}

.sidebar button:hover {
  background: #3b82f6;
}

/* conteúdo */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* 🔥 separado, fora */
.content-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

/* resumo */
.resumo {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.card-resumo {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
  background: #020617;
  border: 1px solid #1e293b;
  text-align: center;
}

/* grid */
.chamados-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  width: 100%;
}

/* cards */
.card {
  border: 1px solid #1e293b;
  padding: 15px;
  border-radius: 10px;
  background: #020617;
  cursor: pointer;
  box-sizing: border-box;
}

/* status */
.status {
  margin-top: 8px;
  padding: 5px 10px;
  border-radius: 6px;
  display: inline-block;
  font-size: 12px;
  color: black;
}

/* CHAT */
#chatBox {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 320px;
  height: 450px;
  background: #020617;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  border: 1px solid #1e293b;
}

.chat-header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  font-size: 14px;
}

#mensagens {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.chat-footer {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 1px solid #1e293b;
}

.chat-footer input {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #1e293b;
  color: white;
}

.chat-footer button {
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 6px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
}

.msg {
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 10px;
  max-width: 75%;
  font-size: 13px;
}

.msg-me {
  background: #3b82f6;
  color: white;
  align-self: flex-end;
}

.msg-other {
  background: #1e293b;
  color: #e2e8f0;
  align-self: flex-start;
}

  </style>
</head>

<body>



</div>

 <canvas id="bg"></canvas>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Painel</h3>

    <button onclick="abrirNovoChamado()">+ Novo Chamado</button>
    <button onclick="carregarChamados()">📋 Chamados</button>
    <button onclick="carregarUsuarios()">👥 Usuários</button>
    <button onclick="logout()">Sair</button>
  </div>

  <!-- ÁREA DIREITA -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h1 class="logo">CJSISTEMAS</h1>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <div class="content-inner">

        <h2 id="tituloPagina">Dashboard</h2>

        <div class="resumo">
          <div class="card-resumo">🟢 <span id="abertos">0</span><br>Abertos</div>
          <div class="card-resumo">🟡 <span id="andamento">0</span><br>Andamento</div>
          <div class="card-resumo">🔴 <span id="vencidos">0</span><br>Vencidos</div>
        </div>

        <div id="listaChamados" class="chamados-grid"></div>
        <div id="listaUsuarios" class="chamados-grid"></div>

      </div>
    </div>

  </div>

</div>

<!-- Chat pequeno na lateral -->
<div id="chatBox">

  <div class="chat-header">
    <span id="chatTitulo"></span>
    <button onclick="fecharChat()">✖</button>
  </div>

  <div id="mensagens"></div>

  <div class="chat-footer">
    <input type="text" id="msg" placeholder="Digite...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<div id="notificacao" style="
  position: fixed;
  top: 20px;
  right: 20px;
  background: #1e293b;
  color: white;
  padding: 14px 18px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  display: none;
  z-index: 999;
  min-width: 250px;
  transform: translateY(-20px);
  opacity: 0;
  transition: all 0.3s ease;
">
  <strong id="notifNome">Usuário</strong>
  <div id="notifTexto" style="font-size:13px; margin-top:4px;"></div>
</div>

<div id="notifBtn" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2563eb;
  color: white;
  padding: 12px 16px;
  border-radius: 50px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  z-index: 9999;
">
  💬 Notificações
  <span id="notifCount" style="
    background: red;
    border-radius: 50%;
    padding: 4px 8px;
    font-size: 12px;
    display: none;
  ">0</span>
</div>

<div id="notifBox" style="
  position: fixed;
  bottom: 70px;
  right: 20px;
  width: 300px;
  max-height: 300px;
  overflow-y: auto;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  display: none;
  z-index: 9999;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
"></div>

</div>

<script>
let totalAnterior = 0;  
let listaNotificacoes = [];
let meuRole = "";
let chamadoAtual = null;
let notificacoesNaoLidas = 0;

// PERFIL DO USUARIO
async function carregarPerfil() {
  const token = localStorage.getItem("token");

  const res = await fetch("/perfil", {
    headers: { Authorization: "Bearer " + token }
  });

  const user = await res.json();
  meuRole = user.role;

  if (user.role === "usuario") {
    document.querySelector("button[onclick='carregarUsuarios()']").style.display = "none";
  }
}

async function carregarUsuarios() {
  const token = localStorage.getItem("token");

  const res = await fetch("/usuarios", {
    headers: { Authorization: "Bearer " + token }
  });

  if (res.status !== 200) {
    alert("Acesso apenas para técnico/admin");
    return;
  }

  const usuarios = await res.json();

  const div = document.getElementById("listaUsuarios");
  const chamadosDiv = document.getElementById("listaChamados");

  // limpa telas
  div.innerHTML = "";
  chamadosDiv.innerHTML = "";

  document.getElementById("tituloPagina").innerText = "Usuários";

  usuarios.forEach(u => {
    const item = document.createElement("div");
    item.classList.add("card");

    item.innerHTML = `
      <strong>${u.nome}</strong><br>
      ${u.email}<br>
      <small>Tipo: ${u.role}</small><br>

      ${
        meuRole === "admin" && u.role === "usuario"
        ? `<button onclick="promover('${u._id}')">
            Promover para técnico
          </button>`
        : ""
      }
    `;

    div.appendChild(item);
  });
}

//  PROMOVER USUÁRIO de função
async function promover(id) {
  const token = localStorage.getItem("token");

  const res = await fetch("/promover/" + id, {
    method: "PUT",
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  alert(data.message || data.error);

  carregarUsuarios(); // recarrega lista
}

// CHAMADOS EXISTENTES
async function carregarChamados() {
  const token = localStorage.getItem("token");

  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });

  let chamados = await res.json();

  // 🔥 FILTRO CORRETO (ANTES DO LOOP)
  //chamados = chamados.filter(c => c.status !== "fechado" || !c.status);

  const div = document.getElementById("listaChamados");
  const usersDiv = document.getElementById("listaUsuarios");

  div.innerHTML = "";
  usersDiv.innerHTML = "";

  let abertos = 0;
  let andamento = 0;
  let vencidos = 0;

  chamados.forEach(c => {

  const agora = new Date();
  const criado = new Date(c.criadoEm || c.createdAt);
  const limite = new Date(criado);

  limite.setDate(limite.getDate() + 4);

  const dataTexto = criado.toLocaleString();
  const diasRestantes = Math.ceil((limite - agora) / (1000 * 60 * 60 * 24));

    if (c.status === "aberto") abertos++;
    if (c.status === "andamento") andamento++;
    if (agora > limite && c.status !== "fechado") vencidos++;

    const item = document.createElement("div");
    item.classList.add("card");

    const statusTexto =
      c.status === "aberto" ? "Aberto" :
      c.status === "andamento" ? "Em andamento" :
      "Fechado";

    const corStatus =
      c.status === "aberto" ? "#22c55e" :
      c.status === "andamento" ? "#facc15" :
      "#ef4444";

    item.innerHTML = `
      <strong>${c.titulo}</strong><br>
      ${c.descricao}<br>
      <small>Categoria: ${c.categoria}</small><br>

      <div class="status" style="background:${corStatus}">
        ${statusTexto}
      </div>

      <p>🕒 Criado em: ${dataTexto}</p>
<p>📅 ${diasRestantes} dias restantes</p>

    `;

    item.onclick = () => {
      window.location.href = "detalhe.html?id=" + c._id;
    };

    div.appendChild(item);
  });

  // 🔥 ATUALIZA RESUMO
  document.getElementById("abertos").innerText = abertos;
  document.getElementById("andamento").innerText = andamento;
  document.getElementById("vencidos").innerText = vencidos;
}

// CHAT com o técnico
function abrirChat(chamado) {
  chamadoAtual = chamado;
  document.getElementById("chatTitulo").innerText = chamado.titulo;
  document.getElementById("chatBox").style.display = "flex";
  renderMensagens();
}

function fecharChat() {
  document.getElementById("chatBox").style.display = "none";
}

function renderMensagens() {
  const div = document.getElementById("mensagens");
  div.innerHTML = "";

  if (!chamadoAtual.mensagens) return;

  chamadoAtual.mensagens.forEach(m => {
    const el = document.createElement("div");

    el.classList.add("msg");

    if (m.autor === meuRole) {
      el.classList.add("msg-me");
    } else {
      el.classList.add("msg-other");
    }

    el.innerHTML = `
      <small>${m.nome || m.autor}</small><br>
      ${m.texto}
    `;

    div.appendChild(el);
  });

  div.scrollTop = div.scrollHeight;
}

// ENVIAR
async function enviar() {
  const texto = document.getElementById("msg").value;
  const token = localStorage.getItem("token");

  if (!texto) return;

  await fetch("/chamados/" + chamadoAtual._id + "/mensagem", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ texto })
  });

  document.getElementById("msg").value = "";

  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });

  const chamados = await res.json();
  chamadoAtual = chamados.find(c => c._id === chamadoAtual._id);

  renderMensagens();
}

// OUTROS
function abrirNovoChamado() {
  window.location.href = "chamados.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

async function mudarStatus(id, status) {
  if (!status) return;

  const token = localStorage.getItem("token");

  const res = await fetch("/chamados/" + id + "/status", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ status })
  });

  const data = await res.json();

  alert(data.message || data.error);

  carregarChamados();
}

function mostrarNotificacao(nome, texto) {
  const box = document.getElementById("notificacao");
  const nomeEl = document.getElementById("notifNome");
  const textoEl = document.getElementById("notifTexto");

  nomeEl.innerText = nome || "Usuário";
  textoEl.innerText = texto || "Nova mensagem";

  // estado inicial (fora da tela)
  box.style.display = "block";
  box.style.opacity = "0";
  box.style.transform = "translateX(100px)";

  // anima entrada
  setTimeout(() => {
    box.style.opacity = "1";
    box.style.transform = "translateX(0)";
  }, 10);

  // anima saída
  setTimeout(() => {
    box.style.opacity = "0";
    box.style.transform = "translateX(100px)";

    setTimeout(() => {
      box.style.display = "none";
    }, 300);
  }, 3000);
}

let ultimaMensagemGlobal = localStorage.getItem("ultimaMsgId");


setInterval(async () => {
  try {
     console.log("RODANDO INTERVAL");
    const token = localStorage.getItem("token");

    const res = await fetch("/chamados", {
      headers: { Authorization: "Bearer " + token }
    });

    const chamados = await res.json();

    let ultimaMsg = null;

    let todasMensagens = [];

chamados.forEach(c => {
  if (c.mensagens?.length) {
    c.mensagens.forEach(m => {
      todasMensagens.push({
        ...m,
        chamadoId: c._id
      });
    });
  }
});

todasMensagens.forEach(m => {
  if (!ultimaMsg) {
    ultimaMsg = m;
  } else {
    const d1 = new Date(ultimaMsg.data || 0).getTime();
    const d2 = new Date(m.data || 0).getTime();

    if (d2 > d1) {
      ultimaMsg = m;
    }
  }
});
    console.log("ULTIMA MSG:", ultimaMsg);

    if (!ultimaMsg) return;

    const idAtual = String(ultimaMsg._id);

    if (!ultimaMensagemGlobal || ultimaMensagemGlobal !== idAtual) {

  const payload = JSON.parse(atob(token.split(".")[1]));
  const meuId = payload.id || payload._id;

  if (String(ultimaMsg.autor) !== String(meuId)) {

    mostrarNotificacao(ultimaMsg.nome, ultimaMsg.texto);

    notificacoesNaoLidas++;

    const badge = document.getElementById("notifCount");
    badge.innerText = notificacoesNaoLidas;
    badge.style.display = "inline-block";

    listaNotificacoes.unshift({
      ...ultimaMsg,
      lida: false
    });
  }

  // 🔥 ATUALIZA AQUI DENTRO
  ultimaMensagemGlobal = idAtual;
localStorage.setItem("ultimaMsgId", idAtual);
}

  } catch (e) {
    console.log("Erro dashboard:", e);
  }
}, 3000);

document.getElementById("notifBtn").onclick = () => {

  const box = document.getElementById("notifBox");

  // 🔥 SE JÁ ESTÁ ABERTO → FECHA E LIMPA
 if (box.style.display === "block") {
  listaNotificacoes = []; // 🔥 limpa de vez
  box.style.display = "none";
  box.innerHTML = "";
  return;
}

  // 🔥 LIMPA ANTES DE MONTAR
  box.innerHTML = "";

  if (listaNotificacoes.length === 0) {
    box.innerHTML = "<p style='padding:10px'>Sem notificações</p>";
  } else {

    listaNotificacoes.forEach((n, index) => {
      const item = document.createElement("div");

      item.style.padding = "10px";
      item.style.borderBottom = "1px solid #1e293b";
      item.style.cursor = "pointer";

      if (!n.lida) {
        item.style.background = "#0f172a";
      }

      item.innerHTML = `
        <strong>${n.nome}</strong><br>
        <span style="font-size:12px">${n.texto}</span>
      `;

      item.onclick = () => {
        listaNotificacoes[index].lida = true;

        listaNotificacoes = []; // 🔥 ESSENCIAL

box.style.display = "none";
box.innerHTML = "";

        window.location.href = "detalhe.html?id=" + n.chamadoId;
        console.log("CLICOU E LIMPOU");
      };

      box.appendChild(item);
    });
  }

  // 🔥 SÓ ABRE AQUI (UMA VEZ)
  box.style.display = "block";

  // 🔥 limpa badge
  notificacoesNaoLidas = 0;
  document.getElementById("notifCount").style.display = "none";
};

carregarPerfil();
carregarChamados();

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#3b82f6";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
