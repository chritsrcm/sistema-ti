<!-- ============================================================================
  DOCUMENTO HTML: PÁGINA DE DASHBOARD DO SISTEMA DE CHAMADOS
  Interface principal com sidebar, listagem de chamados, chat e notificações
============================================================================ -->
<!DOCTYPE html>
<html>
<head>
  <!-- Metadados e título da página -->
  <title>Dashboard</title>
  
  <!-- Link para folha de estilos externa (estilos globais do sistema) -->
  <link rel="stylesheet" href="style.css">
  
  <!-- ========================================================================
    ESTILOS INTERNOS: CSS específico do dashboard
    Inclui reset, layout, componentes, animações e responsividade
  ======================================================================== -->
  <style>
    /* Reset básico de margens e box-sizing para consistência entre navegadores */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Configuração do corpo: fonte, cores e fundo com gradiente */
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 40%, #020617 100%);
      color: #e2e8f0;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Canvas de fundo: elemento para animação de partículas, sem interatividade */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Efeito de brilho animado no fundo com keyframes de pulso e escala */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.08), transparent 45%);
      z-index: 0;
      animation: pulse 20s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* Layout principal: estrutura flex para sidebar e área de conteúdo */
    .app {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Topbar: barra superior fixa com logo e efeito glassmorphism */
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: linear-gradient(180deg, rgba(2,6,23,0.95), rgba(2,6,23,0.85));
      border-bottom: 1px solid rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    /* Logo com gradiente animado e ícone decorativo */
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #3b82f6);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease infinite;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo::before {
      content: '⚡';
      font-size: 18px;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Sidebar: menu lateral com navegação e estilo glassmorphism */
    .sidebar {
      width: 250px;
      min-width: 250px;
      background: linear-gradient(180deg, rgba(2,6,23,0.98), rgba(15,23,42,0.95));
      border-right: 1px solid rgba(30, 41, 59, 0.8);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .sidebar h3 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #64748b;
      margin: 8px 12px 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(30, 41, 59, 0.6);
    }

    /* Botões da sidebar: estilo base, hover e estado ativo */
    .sidebar button {
      width: 100%;
      margin: 6px 0;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: rgba(30, 41, 59, 0.6);
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .sidebar button::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 3px;
      background: linear-gradient(180deg, #3b82f6, #8b5cf6);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sidebar button:hover {
      background: rgba(59, 130, 246, 0.2);
      color: #f1f5f9;
      border-color: rgba(59, 130, 246, 0.4);
      transform: translateX(3px);
    }

    .sidebar button:hover::before {
      opacity: 1;
    }

    .sidebar button:active {
      transform: translateX(1px);
    }

    /* Área de conteúdo principal com scroll e largura máxima */
    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .content-inner {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    /* Título da página com divisor decorativo */
    #tituloPagina {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #tituloPagina::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(148,163,184,0.3), transparent);
      margin-left: 16px;
    }

    /* Controles de filtro e busca: layout flex e estados de interação */
    .filtros, .busca {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filtros button, .busca input {
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      background: rgba(2, 6, 23, 0.8);
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filtros button:hover, .busca input:focus {
      background: rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
      color: #e2e8f0;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .filtros button.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-color: transparent;
      color: white;
      font-weight: 600;
    }

    .busca input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      font-size: 14px;
    }

    .busca input::placeholder {
      color: #64748b;
    }

    /* Cards de resumo: grid responsivo com indicadores de status */
    .resumo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card-resumo {
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(2,6,23,0.9), rgba(15,23,42,0.8));
      border: 1px solid rgba(30, 41, 59, 0.7);
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card-resumo::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #22c55e, #3b82f6, #8b5cf6);
      opacity: 0.7;
    }

    .card-resumo:hover {
      transform: translateY(-3px);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .card-resumo span {
      font-size: 32px;
      font-weight: 800;
      display: block;
      margin: 8px 0 4px;
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Cores específicas para cada card de resumo */
    .card-resumo:first-child span { color: #22c55e; -webkit-text-fill-color: #22c55e; }
    .card-resumo:nth-child(2) span { color: #facc15; -webkit-text-fill-color: #facc15; }
    .card-resumo:last-child span { color: #ef4444; -webkit-text-fill-color: #ef4444; }

    /* Grid de cards de chamados: layout responsivo com auto-fit */
    .chamados-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      width: 100%;
    }

    /* Cards individuais: estilo base, hover e estrutura interna */
    .card {
      border: 1px solid rgba(30, 41, 59, 0.8);
      padding: 18px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(2,6,23,0.95), rgba(15,23,42,0.9));
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card strong {
      font-size: 16px;
      color: #f1f5f9;
      font-weight: 600;
      line-height: 1.4;
    }

    .card small {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .card p {
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }

    /* Badges de status: estilo visual para diferentes estados */
    .status {
      padding: 6px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #020617;
      width: fit-content;
    }

    /* Chat flutuante: posicionamento fixo, animação de entrada e estilo glass */
    #chatBox {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 360px;
      height: 480px;
      max-height: 80vh;
      background: linear-gradient(145deg, rgba(2,6,23,0.98), rgba(15,23,42,0.95));
      border-radius: 18px;
      display: none;
      flex-direction: column;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(30, 41, 59, 0.8);
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(30, 41, 59, 0.8);
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      background: rgba(2, 6, 23, 0.5);
      border-radius: 18px 18px 0 0;
    }

    .chat-header button {
      background: rgba(239, 68, 68, 0.2);
      border: none;
      color: #f87171;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .chat-header button:hover {
      background: rgba(239, 68, 68, 0.4);
      transform: scale(1.05);
    }

    /* Área de mensagens do chat com scrollbar personalizado */
    #mensagens {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #mensagens::-webkit-scrollbar {
      width: 6px;
    }

    #mensagens::-webkit-scrollbar-track {
      background: transparent;
    }

    #mensagens::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 3px;
    }

    .chat-footer {
      display: flex;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid rgba(30, 41, 59, 0.8);
      background: rgba(2, 6, 23, 0.5);
      border-radius: 0 0 18px 18px;
    }

    .chat-footer input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      background: rgba(2, 6, 23, 0.8);
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.2s;
    }

    .chat-footer input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .chat-footer input::placeholder {
      color: #64748b;
    }

    .chat-footer button {
      padding: 12px 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .chat-footer button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }

    .chat-footer button:active {
      transform: translateY(0);
    }

    /* Estilos das mensagens: diferenciação visual entre mensagens próprias e de outros */
    .msg {
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg small {
      display: block;
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .msg-me {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-other {
      background: rgba(30, 41, 59, 0.8);
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    /* Notificações flutuantes: animação de entrada e estilo visual */
    #notificacao {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(145deg, rgba(2,6,23,0.98), rgba(15,23,42,0.95));
      color: #e2e8f0;
      padding: 16px 20px;
      border-radius: 14px;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.1);
      display: none;
      z-index: 999;
      min-width: 280px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    #notifNome {
      font-weight: 700;
      color: #f1f5f9;
      display: block;
      margin-bottom: 4px;
    }

    #notifTexto {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Botão flutuante de notificações com badge animado */
    #notifBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      padding: 14px 20px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 
        0 10px 30px rgba(59, 130, 246, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      z-index: 9999;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #notifBtn:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 15px 40px rgba(59, 130, 246, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    #notifBtn:active {
      transform: translateY(0);
    }

    #notifCount {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-radius: 50%;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
      display: none;
      animation: pulseBadge 2s infinite;
    }

    @keyframes pulseBadge {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }

    /* Caixa de notificações com scroll e estilo glass */
    #notifBox {
      position: fixed;
      bottom: 84px;
      right: 24px;
      width: 320px;
      max-height: 340px;
      overflow-y: auto;
      background: linear-gradient(145deg, rgba(2,6,23,0.98), rgba(15,23,42,0.95));
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      display: none;
      z-index: 9999;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
    }

    #notifBox::-webkit-scrollbar {
      width: 6px;
    }

    #notifBox::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 3px;
    }

    /* Scrollbar personalizado global para consistência visual */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(2, 6, 23, 0.5);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 4px;
      transition: background 0.2s;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.6);
    }

    /* Media queries para responsividade em tablets e mobile */
    @media (max-width: 1024px) {
      .sidebar {
        width: 220px;
        min-width: 220px;
      }
    }

    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        min-width: auto;
        border-right: none;
        border-bottom: 1px solid rgba(30, 41, 59, 0.8);
        padding: 12px 16px;
      }
      
      .sidebar h3 {
        display: none;
      }
      
      .sidebar button {
        margin: 4px 2px;
        padding: 10px 14px;
        font-size: 13px;
        justify-content: center;
      }
      
      .content {
        padding: 16px;
      }
      
      .resumo {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .chamados-grid {
        grid-template-columns: 1fr;
      }
      
      #chatBox {
        width: calc(100% - 48px);
        right: 24px;
        bottom: 80px;
      }
      
      #notifBtn, #notifBox {
        right: 16px;
      }
    }

    @media (max-width: 480px) {
      .resumo {
        grid-template-columns: 1fr;
      }
      
      .filtros, .busca {
        flex-direction: column;
        align-items: stretch;
      }
      
      .busca input {
        min-width: auto;
      }
    }

    /* Acessibilidade: foco visível para navegação via teclado */
    button:focus-visible,
    input:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Classes utilitárias para controle de exibição via JavaScript */
    .hidden { display: none !important; }
    .visible { display: block !important; }
  </style>
</head>

<!-- ============================================================================
  CORPO DA PÁGINA: ESTRUTURA VISUAL DO DASHBOARD
============================================================================ -->
<body>

<!-- Canvas para animação de fundo (partículas) -->
<canvas id="bg"></canvas>

<!-- Container principal da aplicação com layout flex -->
<div class="app">

  <!-- SIDEBAR: Menu de navegação lateral -->
  <div class="sidebar">
    <h3>🔧 Painel</h3>
    
    <button onclick="carregarChamados()">📊 Dashboard</button>
    <button onclick="abrirNovoChamado()">➕ Novo Chamado</button>
    <button onclick="carregarChamadosFiltros()">📋 Chamados</button>
    <button onclick="carregarUsuarios()">👥 Usuários</button>
    <button id="btnRelatorios" onclick="window.location.href='relatorios.html'">
      📈 Relatórios
    </button>
    <button onclick="logout()">🚪 Sair</button>
  </div>

  <!-- ÁREA PRINCIPAL: Topbar + Conteúdo dinâmico -->
  <div class="main">

    <!-- TOPBAR: Cabeçalho fixo com logo da aplicação -->
    <div class="topbar">
      <h1 class="logo">CJSISTEMAS</h1>
    </div>

    <!-- CONTEÚDO DINÂMICO: Área que muda conforme navegação -->
    <div class="content">
      <div class="content-inner">

        <!-- Título da seção atual (Dashboard, Chamados, Usuários) -->
        <h2 id="tituloPagina">Dashboard</h2>

        <!-- Filtros por status de chamado -->
        <div id="filtrosChamados" class="filtros">

<script>
// Variáveis de estado global para controle de sessões e dados
let totalAnterior = 0;

let chamadoAtual = null;
let notificacoesNaoLidas = 0;

// ============================================================================

// Carrega dados do usuário autenticado e ajusta UI conforme permissões
async function carregarPerfil() {
  const token = localStorage.getItem("token");

  const res = await fetch("/perfil", {
    headers: { Authorization: "Bearer " + token }
  });

  const user = await res.json();
  meuRole = user.role;

  // Usuários comuns não acessam módulos administrativos
  if (meuRole === "usuario") {
    const btnUsuarios = document.querySelector("button[onclick='carregarUsuarios()']");
    if (btnUsuarios) btnUsuarios.style.display = "none";
    
    const btnRelatorios = document.getElementById("btnRelatorios");
    if (btnRelatorios) btnRelatorios.style.display = "none";
  }
}

// ============================================================================
// FUNÇÕES DE GERENCIAMENTO DE USUÁRIOS

// Busca lista de usuários e renderiza cards com opção de promoção (apenas admin)
async function carregarUsuarios() {
  mostrarFiltros(false);
  mostrarBusca(false);
  document.getElementById("buscaUsuarios").style.display = "block";
  const token = localStorage.getItem("token");

  const res = await fetch("/usuarios", {
    headers: { Authorization: "Bearer " + token }

  if (res.status !== 200) {

  }

  // Renderiza cada usuário como card interativo

      <strong>${u.nome}</strong><br>

// Promove usuário para perfil técnico via API
async function promover(id) {
  const token = localStorage.getItem("token");

  const res = await fetch("/promover/" + id, {
    method: "PUT",

// Renderiza lista completa de chamados com lógica de prioridade e contadores
function mostrarTodosChamados(chamados) {
  document.getElementById("buscaUsuarios").style.display = "none";
  const div = document.getElementById("listaChamados");
  div.innerHTML = "";

  let abertos = 0;
  let andamento = 0;
  let fechados = 0;

  chamados.forEach(c => {
    const nomeTecnico = c.tecnico && c.tecnico.nome 
      ? c.tecnico.nome 
      : "Não atribuído";
    
    const agora = new Date();
    const criado = new Date(c.criadoEm || c.createdAt);
    const limite = new Date(criado);
    limite.setDate(limite.getDate() + 3);

    const dataTexto = criado.toLocaleString();
    const diasRestantes = Math.ceil((limite - agora) / (1000 * 60 * 60 * 24));

    // Lógica de prioridade baseada em tempo restante e status
    let prioridadeCor = "#22c55e";
    let prioridadeTexto = "NORMAL";

    if (c.status !== "fechado") {
      if (diasRestantes < 1) {
        prioridadeCor = "#ef4444";
        prioridadeTexto = "URGENTE";
      } else if (diasRestantes <= 2) {
        prioridadeCor = "#facc15";
        prioridadeTexto = "ATENÇÃO";
      }
    }

    // Exibe tempo de resolução se chamado estiver fechado
    let tempoResolucao = "";
    if (c.status === "fechado") {
      const fechado = new Date(c.fechadoEm || c.updatedAt);
      const diff = Math.ceil((fechado - criado) / (1000 * 60 * 60 * 24));
      tempoResolucao = `<p style="color:#38bdf8;">⏱ Resolvido em ${diff} dias</p>`;
    }

    // Atualiza contadores do resumo
    if (c.status === "aberto") abertos++;
    if (c.status === "andamento") andamento++;
    if (c.status === "fechado") fechados++;

    const statusTexto = c.status === "aberto" ? "Aberto" :
                        c.status === "andamento" ? "Em andamento" : "Fechado";

    const corStatus = c.status === "aberto" ? "#22c55e" :
                      c.status === "andamento" ? "#facc15" : "#ef4444";

    const item = document.createElement("div");
    item.classList.add("card");

    // Template HTML do card com status, prioridade e botão de ação condicional
    item.innerHTML = `
      <strong>${c.titulo}</strong><br>
      ${c.descricao}<br>
      <small>Categoria: ${c.categoria}</small><br>

      <div style="display:flex; align-items:center; gap:8px; margin:10px 0;">
        <div style="background:${corStatus}; color:#020617; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600;">
          ${statusTexto}
        </div>
        <div style="background:${prioridadeCor}; color:#020617; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:5px;">
          ${prioridadeTexto === "URGENTE" ? "🔥" : prioridadeTexto === "ATENÇÃO" ? "⚠️" : "✔️"}
          ${prioridadeTexto}
        </div>
      </div>

      ${meuRole === "tecnico" && !c.tecnico
        ? `<button style="width:100%; padding:8px; border:none; border-radius:8px; background:#2563eb; color:white; font-weight:600; margin-bottom:10px; cursor:pointer;" onclick="assumirChamado('${c._id}')">Assumir chamado</button>`
        : ""}

      <p>🕒 Criado em: ${dataTexto}</p>
      ${c.status === "fechado" ? tempoResolucao : `<p>📅 ${diasRestantes} dias restantes</p>`}
    `;

    item.onclick = () => {
      window.location.href = "detalhe.html?id=" + c._id;
    };

    div.appendChild(item);
  });

  // Atualiza cards de resumo no topo
  document.getElementById("abertos").innerText = abertos;
  document.getElementById("andamento").innerText = andamento;
  document.getElementById("fechados").innerText = fechados;
  document.getElementById("filtrosChamados").style.display = "flex";
}

// Carrega dashboard inicial com chamados ativos (abertos/em andamento)
async function carregarChamados() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (user?.role === "usuario") {
    const btn = document.getElementById("btnRelatorios");
    if (btn) btn.remove();
  }

  document.getElementById("buscaUsuarios").style.display = "none";
  mostrarBusca(false);
  const token = localStorage.getItem("token");

  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });

  let chamados = await res.json();
  const div = document.getElementById("listaChamados");
  const usersDiv = document.getElementById("listaUsuarios");
  const resumo = document.querySelector(".resumo");

  // Controle de exibição para view de dashboard
  div.style.display = "grid";
  usersDiv.style.display = "none";
  resumo.style.display = "flex";
  document.getElementById("tituloPagina").innerText = "Dashboard";
  div.innerHTML = "";

  let abertos = 0, andamento = 0, fechados = 0;

  // Ordena por data de criação (mais antigo primeiro)
  chamados.sort((a, b) => {
    const dataA = new Date(a.criadoEm || a.createdAt);
    const dataB = new Date(b.criadoEm || b.createdAt);
    return dataA - dataB;
  });

  // Filtra apenas chamados ativos para o dashboard
  const chamadosFiltrados = chamados.filter(c =>
    c.status === "aberto" || c.status === "andamento"
  );

  chamadosFiltrados.forEach(c => {
    const agora = new Date();
    const criado = new Date(c.criadoEm || c.createdAt);
    const limite = new Date(criado);
    limite.setDate(limite.getDate() + 1);

    const dataTexto = criado.toLocaleString();
    const diasRestantes = Math.ceil((limite - agora) / (1000 * 60 * 60 * 24));
    
    // Prioridade simplificada para dashboard
    let prioridadeCor = "#22c55e";
    if (diasRestantes <= 1) prioridadeCor = "#ef4444";
    else if (diasRestantes <= 2) prioridadeCor = "#facc15";

    if (c.status === "aberto") abertos++;
    if (c.status === "andamento") andamento++;
    if (agora > limite && c.status !== "fechado") fechados++;

    const statusTexto = c.status === "aberto" ? "Aberto" :
                        c.status === "andamento" ? "Em andamento" : "Fechado";
    const corStatus = c.status === "aberto" ? "#22c55e" :
                      c.status === "andamento" ? "#facc15" : "#ef4444";

    const item = document.createElement("div");
    item.classList.add("card");

    item.innerHTML = `
      <strong>${c.titulo}</strong><br>
      ${c.descricao}<br>
      <small>Categoria: ${c.categoria}</small><br>
      <div class="status" style="background:${corStatus}">${statusTexto}</div>
      <p>🕒 Criado em: ${dataTexto}</p>
      <p>📅 ${diasRestantes} dias restantes</p>
    `;

    item.onclick = () => {
      window.location.href = "detalhe.html?id=" + c._id;
    };

    div.appendChild(item);
  });

  document.getElementById("abertos").innerText = abertos;
  document.getElementById("andamento").innerText = andamento;
  document.getElementById("fechados").innerText = fechados;
  document.getElementById("filtrosChamados").style.display = "none";
}

// Abre chat flutuante para um chamado específico
function abrirChat(chamado) {
  chamadoAtual = chamado;
  document.getElementById("chatTitulo").innerText = chamado.titulo;
  document.getElementById("chatBox").style.display = "flex";
  renderMensagens();
}

// Fecha chat flutuante
function fecharChat() {
  document.getElementById("chatBox").style.display = "none";
}

// Renderiza mensagens do chat com diferenciação visual por autor
function renderMensagens() {
  const div = document.getElementById("mensagens");
  div.innerHTML = "";

  if (!chamadoAtual.mensagens) return;

  chamadoAtual.mensagens.forEach(m => {
    const el = document.createElement("div");
    el.classList.add("msg");

    if (m.autor === meuRole) {
      el.classList.add("msg-me");
    } else {
      el.classList.add("msg-other");
    }

    el.innerHTML = `<small>${m.nome || m.autor}</small><br>${m.texto}`;
    div.appendChild(el);
  });

  div.scrollTop = div.scrollHeight; // Rola para última mensagem
}

// Envia nova mensagem para o chamado atual via API
async function enviar() {
  const texto = document.getElementById("msg").value;
  const token = localStorage.getItem("token");

  if (!texto) return;

  await fetch("/chamados/" + chamadoAtual._id + "/mensagem", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ texto })
  });

  document.getElementById("msg").value = "";

  // Recarrega dados do chamado para atualizar chat
  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });
  const chamados = await res.json();
  chamadoAtual = chamados.find(c => c._id === chamadoAtual._id);

  renderMensagens();
}

// Exibe notificação flutuante com animação de entrada e saída
function mostrarNotificacao(nome, texto) {
  const box = document.getElementById("notificacao");
  const nomeEl = document.getElementById("notifNome");
  const textoEl = document.getElementById("notifTexto");

  nomeEl.innerText = nome || "Usuário";
  textoEl.innerText = texto || "Nova mensagem";

  box.style.transform = "translateX(100px)";

    box.style.opacity = "0";
    box.style.transform = "translateX(100px)";
    setTimeout(() => { box.style.display = "none"; }, 300);
  }, 3000);
}

// ============================================================================
// POLLING DE NOTIFICAÇÕES EM TEMPO REAL (INTERVALO DE 3 SEGUNDOS)
// ============================================================================

let ultimaMensagemGlobal = localStorage.getItem("ultimaMsgId");

setInterval(async () => {
  try {
    const token = localStorage.getItem("token");
    const res = await fetch("/chamados", {
      headers: { Authorization: "Bearer " + token }
    });
    const chamados = await res.json();

    // Coleta todas as mensagens de todos os chamados
    let ultimaMsg = null;
    let todasMensagens = [];

    chamados.forEach(c => {
      if (c.mensagens?.length) {
        c.mensagens.forEach(m => {
          todasMensagens.push({ ...m, chamadoId: c._id });
        });
      }
    });

    // Encontra a mensagem mais recente por timestamp
    todasMensagens.forEach(m => {
      if (!ultimaMsg) {
        ultimaMsg = m;
      } else {
        const d1 = new Date(ultimaMsg.data || 0).getTime();
        const d2 = new Date(m.data || 0).getTime();
        if (d2 > d1) ultimaMsg = m;
      }
    });

    if (!ultimaMsg) return;

    const idAtual = String(ultimaMsg._id);

    // Notifica apenas se for mensagem nova e de outro usuário
    if (!ultimaMensagemGlobal || ultimaMensagemGlobal !== idAtual) {
      const payload = JSON.parse(atob(token.split(".")[1]));
      const meuId = payload.id || payload._id;

      if (String(ultimaMsg.autor) !== String(meuId)) {
        mostrarNotificacao(ultimaMsg.nome, ultimaMsg.texto);
        notificacoesNaoLidas++;

        const badge = document.getElementById("notifCount");
        badge.innerText = notificacoesNaoLidas;
        badge.style.display = "inline-block";

        listaNotificacoes.unshift({ ...ultimaMsg, lida: false });
      }
      ultimaMensagemGlobal = idAtual;
      localStorage.setItem("ultimaMsgId", idAtual);
    }
  } catch (e) {
    console.log("Erro dashboard:", e);
  }
}, 3000);

// ============================================================================
// GERENCIAMENTO DA CAIXA DE NOTIFICAÇÕES
// ============================================================================

document.getElementById("notifBtn").onclick = () => {
  const box = document.getElementById("notifBox");

  // Toggle: se aberto, fecha e limpa; se fechado, monta e exibe
  if (box.style.display === "block") {
    listaNotificacoes = [];
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  box.innerHTML = "";

  if (listaNotificacoes.length === 0) {
    box.innerHTML = "<p style='padding:10px'>Sem notificações</p>";
  } else {
    listaNotificacoes.forEach((n, index) => {
      const item = document.createElement("div");
      item.style.padding = "10px";
      item.style.borderBottom = "1px solid #1e293b";
      item.style.cursor = "pointer";

      if (!n.lida) item.style.background = "#0f172a";

      item.innerHTML = `<strong>${n.nome}</strong><br><span style="font-size:12px">${n.texto}</span>`;

      item.onclick = () => {
        listaNotificacoes[index].lida = true;
        listaNotificacoes = [];
        box.style.display = "none";
        box.innerHTML = "";
        window.location.href = "detalhe.html?id=" + n.chamadoId;
      };

      box.appendChild(item);
    });
  }

  box.style.display = "block";
  notificacoesNaoLidas = 0;
  document.getElementById("notifCount").style.display = "none";
};

// ============================================================================
// INICIALIZAÇÃO E ANIMAÇÃO DE FUNDO
// ============================================================================

carregarPerfil();
carregarChamados();

// Configuração do canvas para animação de partículas
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5
  });
}

// Loop de animação: atualiza posição e redesenha partículas
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#3b82f6";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

// Filtra chamados por status (botões) e/ou texto livre (busca)
function filtrarChamados(tipo = null) {
  const texto = document.getElementById("inputBusca")?.value.toLowerCase() || "";
  let filtrados = chamadosGlobal;

  if (tipo && tipo !== "todos") {
    filtrados = filtrados.filter(c => c.status.toLowerCase() === tipo);
  }

  filtrados = filtrados.filter(c =>
    (c.titulo || "").toLowerCase().includes(texto) ||
    (c.descricao || "").toLowerCase().includes(texto) ||
    (c.numero || "").toLowerCase().includes(texto)
  );

  mostrarTodosChamados(filtrados);

  // Atualiza estado visual dos botões de filtro
  if (tipo) {
    document.querySelectorAll(".filtros button").forEach(btn => {
      btn.classList.remove("active");
    });
    event?.target?.classList.add("active");
  }
}

async function assumirChamado(id) {

  await fetch("/chamados/" + id + "/assumir", {
    method: "PUT",
    headers: { Authorization: "Bearer " + token }
  });
  carregarChamados();
}

function mostrarBusca(mostrar) {

  busca.style.display = mostrar ? "block" : "none";

function mostrarFiltros(mostrar) {
  const filtros = document.querySelector(".filtros");
  if (!filtros) return;
  filtros.style.display = mostrar ? "flex" : "none";
}

// Filtra usuários por nome ou email
function filtrarUsuarios() {
  const texto = document.getElementById("inputBuscaUsuario").value.toLowerCase();
  const filtrados = usuariosGlobal.filter(u =>
    (u.nome || "").toLowerCase().includes(texto) ||
    (u.email || "").toLowerCase().includes(texto)
  );
  mostrarUsuarios(filtrados);
}

// Renderiza lista de usuários filtrados
function mostrarUsuarios(usuarios) {
  const div = document.getElementById("listaUsuarios");
  div.innerHTML = "";

  usuarios.forEach(u => {
    const item = document.createElement("div");
    item.classList.add("card");

    item.innerHTML = `
      <strong>${u.nome}</strong><br>
      ${u.email}<br>
      <small>Tipo: ${u.role}</small><br>
      ${meuRole === "admin" && u.role === "usuario"
        ? `<button onclick="promover('${u._id}')">Promover para técnico</button>`
        : ""}
    `;

    div.appendChild(item);
  });
}
</script>

</body>
