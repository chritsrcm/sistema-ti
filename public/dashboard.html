<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .resumo {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card-resumo {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      background: #020617;
      border: 1px solid #1e293b;
      text-align: center;
    }

    .chamados-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      border: 1px solid #1e293b;
      padding: 15px;
      border-radius: 10px;
      background: #020617;
      cursor: pointer;
    }

    .status {
      margin-top: 8px;
      padding: 5px 10px;
      border-radius: 6px;
      display: inline-block;
      font-size: 12px;
      color: black;
    }

    /* 🔥 CHAT MINI */
    #chatBox {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 320px;
      height: 450px;
      background: #020617;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border: 1px solid #1e293b;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    #mensagens {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .chat-footer {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #1e293b;
    }

    .chat-footer input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: white;
    }

    .chat-footer button {
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 6px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }

    .msg {
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 10px;
      max-width: 75%;
      font-size: 13px;
    }

    .msg-me {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
    }

    .msg-other {
      background: #1e293b;
      color: #e2e8f0;
      align-self: flex-start;
    }
  </style>
</head>
<body>

<div class="dashboard">

  <div class="sidebar">
    <h3>Painel</h3>

    <button onclick="abrirNovoChamado()">+ Novo Chamado</button>
    <button onclick="carregarChamados()">📋 Chamados</button>
    <button onclick="carregarUsuarios()">👥 Usuários</button>
    <button onclick="logout()">Sair</button>
  </div>

  <div class="content">

    <h2 id="tituloPagina">Dashboard</h2>

    <div class="resumo">
      <div class="card-resumo">🟢 <span id="abertos">0</span><br>Abertos</div>
      <div class="card-resumo">🟡 <span id="andamento">0</span><br>Andamento</div>
      <div class="card-resumo">🔴 <span id="vencidos">0</span><br>Vencidos</div>
    </div>

    <div id="listaChamados" class="chamados-grid"></div>
    <div id="listaUsuarios" class="chamados-grid"></div>

  </div>
</div>

<!-- 🔥 CHAT MINI -->
<div id="chatBox">

  <div class="chat-header">
    <span id="chatTitulo"></span>
    <button onclick="fecharChat()">✖</button>
  </div>

  <div id="mensagens"></div>

  <div class="chat-footer">
    <input type="text" id="msg" placeholder="Digite...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script>
let meuRole = "";
let chamadoAtual = null;

// PERFIL
async function carregarPerfil() {
  const token = localStorage.getItem("token");

  const res = await fetch("/perfil", {
    headers: { Authorization: "Bearer " + token }
  });

  const user = await res.json();
  meuRole = user.role;

  if (user.role === "usuario") {
    document.querySelector("button[onclick='carregarUsuarios()']").style.display = "none";
  }
}

async function carregarUsuarios() {
  const token = localStorage.getItem("token");

  const res = await fetch("/usuarios", {
    headers: { Authorization: "Bearer " + token }
  });

  if (res.status !== 200) {
    alert("Acesso apenas para técnico/admin");
    return;
  }

  const usuarios = await res.json();

  const div = document.getElementById("listaUsuarios");
  const chamadosDiv = document.getElementById("listaChamados");

  // limpa telas
  div.innerHTML = "";
  chamadosDiv.innerHTML = "";

  document.getElementById("tituloPagina").innerText = "Usuários";

  usuarios.forEach(u => {
    const item = document.createElement("div");
    item.classList.add("card");

    item.innerHTML = `
      <strong>${u.nome}</strong><br>
      ${u.email}<br>
      <small>Tipo: ${u.role}</small><br>

      ${
        meuRole === "admin" && u.role === "usuario"
        ? `<button onclick="promover('${u._id}')">
            Promover para técnico
          </button>`
        : ""
      }
    `;

    div.appendChild(item);
  });
}

// 🔥 PROMOVER USUÁRIO
async function promover(id) {
  const token = localStorage.getItem("token");

  const res = await fetch("/promover/" + id, {
    method: "PUT",
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  alert(data.message || data.error);

  carregarUsuarios(); // recarrega lista
}

// CHAMADOS
async function carregarChamados() {
  const token = localStorage.getItem("token");

  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });

  const chamados = await res.json();

  const div = document.getElementById("listaChamados");
  const usersDiv = document.getElementById("listaUsuarios");

  div.innerHTML = "";
  usersDiv.innerHTML = "";

  let abertos = 0;
  let andamento = 0;
  let vencidos = 0;

  chamados.forEach(c => {

    const agora = new Date();
    const criado = new Date(c.criadoEm);
    const limite = new Date(criado);
    limite.setDate(limite.getDate() + 4);

    if (c.status === "aberto") abertos++;
    if (c.status === "andamento") andamento++;
    if (agora > limite && c.status !== "fechado") vencidos++;

    const item = document.createElement("div");
    item.classList.add("card");

    const statusTexto =
      c.status === "aberto" ? "Aberto" :
      c.status === "andamento" ? "Em andamento" :
      "Fechado";

    const corStatus =
      c.status === "aberto" ? "#22c55e" :
      c.status === "andamento" ? "#facc15" :
      "#ef4444";

    item.innerHTML = `
      <strong>${c.titulo}</strong><br>
      ${c.descricao}<br>
      <small>Categoria: ${c.categoria}</small><br>

      <div class="status" style="background:${corStatus}">
        ${statusTexto}
      </div>
    `;

    item.onclick = () => abrirChat(c);

    div.appendChild(item);
  });

  // 🔥 RESUMO
  document.getElementById("abertos").innerText = abertos;
  document.getElementById("andamento").innerText = andamento;
  document.getElementById("vencidos").innerText = vencidos;
}

// CHAT
function abrirChat(chamado) {
  chamadoAtual = chamado;
  document.getElementById("chatTitulo").innerText = chamado.titulo;
  document.getElementById("chatBox").style.display = "flex";
  renderMensagens();
}

function fecharChat() {
  document.getElementById("chatBox").style.display = "none";
}

function renderMensagens() {
  const div = document.getElementById("mensagens");
  div.innerHTML = "";

  if (!chamadoAtual.mensagens) return;

  chamadoAtual.mensagens.forEach(m => {
    const el = document.createElement("div");

    el.classList.add("msg");

    if (m.autor === meuRole) {
      el.classList.add("msg-me");
    } else {
      el.classList.add("msg-other");
    }

    el.innerHTML = `
      <small>${m.nome || m.autor}</small><br>
      ${m.texto}
    `;

    div.appendChild(el);
  });

  div.scrollTop = div.scrollHeight;
}

// ENVIAR
async function enviar() {
  const texto = document.getElementById("msg").value;
  const token = localStorage.getItem("token");

  if (!texto) return;

  await fetch("/chamados/" + chamadoAtual._id + "/mensagem", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ texto })
  });

  document.getElementById("msg").value = "";

  const res = await fetch("/chamados", {
    headers: { Authorization: "Bearer " + token }
  });

  const chamados = await res.json();
  chamadoAtual = chamados.find(c => c._id === chamadoAtual._id);

  renderMensagens();
}

// OUTROS
function abrirNovoChamado() {
  window.location.href = "chamados.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

carregarPerfil();
carregarChamados();
</script>

</body>
</html>
