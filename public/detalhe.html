<!DOCTYPE html>
<html>
<head>
  <title>Detalhe do Chamado</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 40%, #020617 100%);
      color: #e2e8f0;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Canvas de fundo */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Efeitos de brilho no fundo */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      top: -150px;
      left: -150px;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      bottom: -100px;
      right: -100px;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Container principal */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 30px auto;
      background: linear-gradient(145deg, rgba(2,6,23,0.95), rgba(15,23,42,0.9));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-top-color: rgba(59, 130, 246, 0.4);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: scale(0.98) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #3b82f6, #8b5cf6, transparent);
      border-radius: 0 0 12px 12px;
    }

    /* Header */
    .header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(30, 41, 59, 0.6);
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #020617;
    }

    /* Info section */
    .info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(2, 6, 23, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(30, 41, 59, 0.5);
    }

    .info p {
      color: #94a3b8;
      font-size: 13px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info p strong {
      color: #e2e8f0;
      font-weight: 600;
    }

    /* Descrição */
    .descricao-box {
      padding: 18px;
      background: rgba(2, 6, 23, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(30, 41, 59, 0.5);
      margin-bottom: 20px;
    }

    .descricao-box p {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
      white-space: pre-wrap;
    }

    /* Anexo */
    .anexo-box {
      padding: 14px 18px;
      background: rgba(30, 41, 59, 0.3);
      border-radius: 10px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #94a3b8;
    }

    .anexo-box a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .anexo-box a:hover {
      color: #3b82f6;
      text-decoration: underline;
    }

    /* Ações / Botões */
    .acoes {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      font-size: 14px;
      font-weight: 10;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    .acoes button:nth-child(2) {
      background: linear-gradient(135deg, #475569, #64748b);
    }

    .acoes button:nth-child(2):hover {
      box-shadow: 0 10px 30px -10px rgba(100, 116, 139, 0.4);
    }

    /* Chat Container - Layout tipo WhatsApp */
    #chatContainer {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(30, 41, 59, 0.6);
      animation: slideIn 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 520px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #chatContainer h3 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #mensagens {
      background: rgba(2, 6, 23, 0.95);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(30, 41, 59, 0.6);
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      max-height: 380px;
    }

    #mensagens::-webkit-scrollbar {
      width: 6px;
    }

    #mensagens::-webkit-scrollbar-track {
      background: transparent;
    }

    #mensagens::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 3px;
    }

    /* Mensagens do chat - Estilo bolha */
    #mensagens > div {
      display: flex;
      margin-bottom: 4px;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 70%;
      font-size: 14px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-me {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-other {
      background: rgba(30, 41, 59, 0.95);
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    /* Chat input area fixa embaixo */
    .chat-input {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .chat-input input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 25px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      background: rgba(2, 6, 23, 0.9);
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.2s;
    }

    .chat-input input::placeholder {
      color: #64748b;
    }

    .chat-input input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: rgba(2, 6, 23, 1);
    }

    .chat-input button {
      padding: 14px 28px;
      border-radius: 25px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      white-space: nowrap;
      font-weight: 600;
    }

    .chat-input button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }

    /* Notificação flutuante */
    #notificacao {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(145deg, rgba(2,6,23,0.98), rgba(15,23,42,0.95));
      color: #e2e8f0;
      padding: 16px 20px;
      border-radius: 14px;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.1);
      display: none;
      z-index: 999;
      min-width: 280px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    #notifNome {
      font-weight: 700;
      color: #f1f5f9;
      display: block;
      margin-bottom: 4px;
    }

    #notifTexto {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .container {
        margin: 20px 16px;
        padding: 24px 20px;
        border-radius: 16px;
      }

      h2 {
        font-size: 20px;
      }

      .info {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .acoes {
        flex-direction: column;
      }

      .acoes button {
        width: 100%;
        justify-content: center;
      }

      #chatContainer {
        height: 480px;
      }

      #mensagens {
        max-height: 320px;
      }

      .msg {
        max-width: 85%;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 20px 16px;
      }

      .badges {
        flex-direction: column;
        align-items: flex-start;
      }

      .chat-input {
        flex-direction: column;
      }

      .chat-input button {
        width: 100%;
      }

      #chatContainer {
        height: 450px;
      }

      #mensagens {
        max-height: 280px;
        padding: 12px;
      }
    }

    /* Acessibilidade */
    button:focus-visible,
    input:focus-visible,
    a:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Utilitários */
    .hidden { display: none !important; }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2 id="titulo"></h2>
    <div class="badges">
      <span id="status" class="badge"></span>
      <span id="prioridade" class="badge"></span>
    </div>
  </div>

  <!-- INFO -->
  <div class="info">
    <p>🔢 <strong id="numero"></strong></p>
    <p>🏢 <strong id="empresa"></strong></p>
    <p>🏢 <strong id="setor"></strong></p>
    <p>👨‍ <strong id="tecnico"></strong></p>
    <p>📂 <span id="categoria"></span></p>
  </div>

  <!-- DESCRIÇÃO -->
  <div class="descricao-box">
    <p id="descricao"></p>
  </div>

  <!-- ANEXO -->
  <div id="anexo" class="anexo-box"></div>

  <!-- AÇÕES DINÂMICAS -->
  <div id="acoes" class="acoes"></div>

  <!-- BOTÕES FIXOS -->
  <div class="acoes">
    <button onclick="abrirChat()">💬 Chat</button>
    <button onclick="voltar()">⬅ Voltar</button>
  </div>

  <!-- CHAT -->
  <div id="chatContainer" style="display:none;">
    <h3>💬 Conversa</h3>
    <div id="mensagens"></div>
    <div class="chat-input">
      <input type="text" id="msg" placeholder="Digite sua mensagem...">
      <button onclick="enviar()">Enviar</button>
    </div>
  </div>

</div>

<!-- NOTIFICAÇÃO -->
<div id="notificacao">
  <strong id="notifNome">Usuário</strong>
  <div id="notifTexto"></div>
</div>

<!-- SEU SCRIPT ORIGINAL - ABSOLUTAMENTE INTACTO -->
<script>
let meuId = null;
let chamadoAtual = null;
let ultimoIdMensagem = null;
let audioLiberado = false;
let qtdMensagensAnterior = 0;

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");


document.addEventListener("click", () => {
  audioLiberado = true;
});

const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

function tocarSom() {
  if (!audioLiberado) return;

  audio.currentTime = 0;
  audio.play().catch(() => {});
}

function voltar() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "/dashboard.html";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  carregarChamado();
});

async function carregarChamado()
 {
  try {
    const token = localStorage.getItem("token");
    console.log("TOKEN:", token);

    const res = await fetch("/chamados", {
      headers: { Authorization: "Bearer " + token }
    });

    const chamados = await res.json();

    if (!Array.isArray(chamados)) return;

    chamadoAtual = chamados.find(c => String(c._id) === String(id));
    if (!chamadoAtual) return;

    document.getElementById("titulo").innerText = chamadoAtual.titulo;
    document.getElementById("descricao").innerText = chamadoAtual.descricao;
    document.getElementById("categoria").innerText = "Categoria: " + chamadoAtual.categoria;
    const statusEl = document.getElementById("status");

statusEl.innerText = chamadoAtual.status.toUpperCase();

if (chamadoAtual.status === "aberto") {
  statusEl.style.background = "#22c55e";
}

if (chamadoAtual.status === "andamento") {
  statusEl.style.background = "#facc15";
}

if (chamadoAtual.status === "fechado") {
  statusEl.style.background = "#ef4444";
}
   // 🔥 NOVOS CAMPOS
document.getElementById("numero").innerText =
  "Chamado: " + (chamadoAtual.numero || "N/A");

document.getElementById("empresa").innerText =
  "Empresa: " + (chamadoAtual.empresa || "N/A");

document.getElementById("setor").innerText =
  "Setor: " + (chamadoAtual.setor || "N/A");

// técnico (com populate)
const nomeTecnico = chamadoAtual.tecnico?.nome || "Não atribuído";

document.getElementById("tecnico").innerText =
  "Técnico: " + nomeTecnico;

// anexo
if (chamadoAtual.arquivo) {
  document.getElementById("anexo").innerHTML = `
    📎 <a href="/uploads/${chamadoAtual.arquivo}" download>
      Baixar arquivo
    </a>
  `;
} else {
  document.getElementById("anexo").innerText = "Anexo: Nenhum";
}


    const perfilRes = await fetch("/perfil", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await perfilRes.json();
    meuId = user._id;

    // 🔥 inicializa ID da última mensagem
    if (chamadoAtual.mensagens?.length) {
  const ultima = chamadoAtual.mensagens[chamadoAtual.mensagens.length - 1];
  ultimoIdMensagem = ultima.texto + ultima.autor;
}

    // 🔥 BOTÕES
    const acoes = document.getElementById("acoes");
    acoes.innerHTML = "";

    if (user.role === "tecnico" || user.role === "admin") {

      if (chamadoAtual.status === "aberto") {
        acoes.innerHTML += `
          <button onclick="mudarStatus('andamento')">▶️ Iniciar Chamado</button>
        `;
      }

      if (chamadoAtual.status !== "fechado") {
        acoes.innerHTML += `
          <button onclick="mudarStatus('fechado')">✅ Fechar Chamado</button>
        `;
      }
    }

    renderMensagens();

  } catch (err) {
    console.log("Erro:", err);
  }

  qtdMensagensAnterior = chamadoAtual.mensagens?.length || 0;
}

function renderMensagens() {
  const div = document.getElementById("mensagens");
  div.innerHTML = "";

  if (!chamadoAtual?.mensagens) return;

  chamadoAtual.mensagens.forEach(m => {

    const hora = new Date(m.data).toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });

    const wrapper = document.createElement("div");
    const el = document.createElement("div");

    const minhaMensagem = String(m.autor) === String(meuId);

    wrapper.style.display = "flex";
    wrapper.style.justifyContent = minhaMensagem ? "flex-end" : "flex-start";
    wrapper.style.marginBottom = "8px";

    el.style.maxWidth = "60%";
    el.style.padding = "10px";
    el.style.borderRadius = "14px";
    el.style.fontSize = "13px";
    el.style.wordBreak = "break-word";

    el.style.background = minhaMensagem ? "#2563eb" : "#1e293b";
    el.style.color = minhaMensagem ? "white" : "#e2e8f0";

    el.innerHTML = `
      <div style="font-size:11px; opacity:0.6;">
        ${m.nome || "Usuário"}
      </div>
      <div style="margin-top:3px;">${m.texto}</div>
      <div style="font-size:10px; opacity:0.5; margin-top:4px; text-align:right;">
        ${hora}
      </div>
    `;

    wrapper.appendChild(el);
    div.appendChild(wrapper);
  });

  div.scrollTop = div.scrollHeight;
}

async function enviar() {
  const texto = document.getElementById("msg").value;
  const token = localStorage.getItem("token");

  if (!texto) return;

  await fetch("/chamados/" + id + "/mensagem", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ texto })
  });

  document.getElementById("msg").value = "";
  await carregarChamado();
}

async function mudarStatus(status) {
  const token = localStorage.getItem("token");

  await fetch("/chamados/" + id + "/status", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ status })
  });

  alert("Status atualizado!");
  window.location.href = "dashboard.html";
}

// 🔄 AUTO UPDATE
setInterval(async () => {
  try {
    const token = localStorage.getItem("token");

    const res = await fetch("/chamados", {
      headers: { Authorization: "Bearer " + token }
    });

    const chamados = await res.json();

    const atualizado = chamados.find(c => String(c._id) === String(id));
    if (!atualizado) return;

    const mensagens = atualizado.mensagens || [];

    console.log("📡 Técnico recebeu:", mensagens.length);

    // 🔥 SE MUDOU
    if (!chamadoAtual || mensagens.length !== (chamadoAtual.mensagens?.length || 0)) {

  const ultimaMsg = mensagens[mensagens.length - 1];

  console.log("🆕 Nova detectada:", ultimaMsg);

  if (ultimaMsg && String(ultimaMsg.autor) !== String(meuId)) {
    tocarSom();
    mostrarNotificacao(ultimaMsg.nome, ultimaMsg.texto);
    console.log("🔔 NOTIFICOU!");
  }

  chamadoAtual = atualizado;
  renderMensagens();
}

  } catch (e) {
    console.log("Erro:", e);
  }

  

}, 2000);

function abrirChat() {
  const chat = document.getElementById("chatContainer");
  const btn = event.target;

  if (chat.style.display === "none") {
    chat.style.display = "block";
    btn.innerText = "❌ Fechar chat";
  } else {
    chat.style.display = "none";
    btn.innerText = "💬 Chat com o técnico";
  }
}

function mostrarNotificacao(nome, texto) {
  const box = document.getElementById("notificacao");
  const nomeEl = document.getElementById("notifNome");
  const textoEl = document.getElementById("notifTexto");

  nomeEl.innerText = nome || "Usuário";
  textoEl.innerText = texto || "Nova mensagem";

  box.style.display = "block";

  setTimeout(() => {
    box.style.opacity = "1";
    box.style.transform = "translateY(0)";
  }, 10);

  setTimeout(() => {
    box.style.opacity = "0";
    box.style.transform = "translateY(-20px)";

    setTimeout(() => {
      box.style.display = "none";
    }, 300);
  }, 3000);
}

window.onload = () => {

  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resize();

  let stars = [];

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5,
      speed: Math.random() * 0.3
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
      star.y += star.speed;

      if (star.y > canvas.height) {
        star.y = 0;
        star.x = Math.random() * canvas.width;
      }

      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.fill();
    });

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("resize", resize);
};
</script>
