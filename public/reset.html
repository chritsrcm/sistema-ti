<!DOCTYPE html>
<html>
<head>
  <title>Reset</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Resetar Senha</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Nova senha">

  <button onclick="resetar()">Atualizar</button>

  <p id="msg"></p>
</div>

<script>
async function resetar() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("msg");

  if (!email || !senha) {
    msg.innerText = "Preencha todos os campos";
    return;
  }

  try {
    const res = await fetch("/reset-password", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, novaSenha: senha })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = data.error || "Erro ao atualizar";
      return;
    }

    msg.innerText = "Senha atualizada!";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);

  } catch (err) {
    msg.innerText = "Erro ao conectar com o servidor";
  }
}
</script>

</body>
</html>
