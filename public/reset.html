<!-- ============================================================================
  DOCUMENTO HTML: PÁGINA DE REDEFINIÇÃO DE SENHA
  Interface para atualização de credenciais com validação e integração com API
============================================================================ -->
<!DOCTYPE html>
<html>
<head>
  <!-- Metadados e título da página -->
  <title>Reset</title>
  
  <!-- Link para folha de estilos externa (estilos globais do sistema) -->
  <link rel="stylesheet" href="style.css">
  
  <!-- ========================================================================
    ESTILOS INTERNOS: CSS específico da página de reset de senha
    Inclui reset, layout, animações, componentes e responsividade
  ======================================================================== -->
  <style>
    /* Reset básico de margens e box-sizing para consistência entre navegadores */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Configuração do corpo: centralização, fundo com gradiente e overflow controlado */
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 40%, #020617 100%);
      color: #e2e8f0;
      position: relative;
    }

    /* Canvas de fundo: elemento para animação de partículas, sem interatividade */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Efeitos de brilho flutuante no fundo com animação suave (tema laranja/vermelho) */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.2;
      z-index: 0;
      animation: float 10s ease-in-out infinite;
    }

    body::before {
      width: 550px;
      height: 550px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    body::after {
      width: 450px;
      height: 450px;
      background: linear-gradient(135deg, #ef4444, #f59e0b);
      bottom: -80px;
      right: -80px;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(25px, -15px) scale(1.03); }
      66% { transform: translate(-15px, 25px) scale(0.97); }
    }

    /* Container principal: estilo glassmorphism com bordas, sombra e detalhe superior */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: linear-gradient(145deg, rgba(2,6,23,0.95), rgba(15,23,42,0.9));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 40px 35px;
      border-radius: 24px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-top-color: rgba(245, 158, 11, 0.4);
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 0 60px rgba(245, 158, 11, 0.1);
      animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: scale(0.98) translateY(25px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Detalhe decorativo superior no container com gradiente temático */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #f59e0b, #ef4444, transparent);
      border-radius: 0 0 12px 12px;
    }

    /* Título do formulário com ícone decorativo e divisor inferior */
    .container h2 {
      margin: 0 0 28px;
      text-align: center;
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .container h2::before {
      content: '🔐';
      font-size: 20px;
    }

    .container h2::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: rgba(245, 158, 11, 0.5);
      border-radius: 2px;
    }

    /* Estilos base para campos de input: email e senha */
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid rgba(30, 41, 59, 0.9);
      background: rgba(2, 6, 23, 0.8);
      color: #e2e8f0;
      font-size: 15px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    input::placeholder {
      color: #64748b;
      font-weight: 400;
    }

    /* Estado de foco: destaque visual com cor temática e sombra */
    input:focus {
      border-color: #f59e0b;
      background: rgba(2, 6, 23, 1);
      box-shadow: 
        0 0 0 4px rgba(245, 158, 11, 0.15),
        0 8px 25px rgba(0, 0, 0, 0.3);
      transform: translateY(-1px);
    }

    /* Botão principal: gradiente laranja, efeito de brilho ao hover e transições */
    button {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 50%, #fbbf24 100%);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
      margin-top: 8px;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 12px 35px -10px rgba(245, 158, 11, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    button:active {
      transform: translateY(0);
    }

    /* Mensagem de status: feedback visual dinâmico para sucesso ou erro */
    #msg {
      margin-top: 18px;
      font-size: 14px;
      text-align: center;
      font-weight: 500;
      min-height: 20px;
      animation: fadeIn 0.3s ease;
    }

    #msg:empty {
      display: none;
    }

    /* Cores dinâmicas para a mensagem: padrão âmbar, sucesso em verde, erro em vermelho */
    #msg { color: #fbbf24; }
    #msg:not(:empty):not([style*="color: #ef4444"]) { 
      color: #10b981; 
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Media query para responsividade em mobile */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .container { padding: 32px 28px; border-radius: 20px; }
      .container h2 { font-size: 20px; margin-bottom: 24px; }
      input { padding: 13px 15px; font-size: 14px; margin-bottom: 16px; }
      button { padding: 13px 18px; font-size: 14px; }
    }

    /* Acessibilidade: foco visível para navegação via teclado */
    input:focus-visible,
    button:focus-visible {
      outline: 2px solid #f59e0b;
      outline-offset: 2px;
    }

    /* Animação de entrada escalonada para os campos de input */
    input { animation: slideIn 0.4s ease backwards; }
    input:nth-child(1) { animation-delay: 0.1s; }
    input:nth-child(2) { animation-delay: 0.2s; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Efeito de erro na mensagem: animação de shake para chamar atenção */
    #msg[style*="color: rgb(239, 68, 68)"],
    #msg[style*="color:#ef4444"] {
      color: #f87171 !important;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
  </style>
</head>

<!-- ============================================================================
  CORPO DA PÁGINA: ESTRUTURA VISUAL DO FORMULÁRIO DE RESET
============================================================================ -->
<body>

<!-- Canvas para animação de fundo (partículas) -->
<canvas id="bg"></canvas>

<!-- Container principal do formulário de redefinição de senha -->
<div class="container">
  <h2>Resetar Senha</h2>

  <!-- Campo de email para identificar a conta a ser atualizada -->
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  
  <!-- Campo de nova senha com autocomplete para segurança do navegador -->
  <input type="password" id="senha" placeholder="Nova senha segura" autocomplete="new-password">

  <!-- Botão de ação: aciona função resetar() -->
  <button onclick="resetar()">🔄 Atualizar</button>

  <!-- Área para exibição de mensagens de feedback (sucesso, erro ou validação) -->
  <p id="msg"></p>
</div>

<!-- ============================================================================
  JAVASCRIPT: LÓGICA DE REDEFINIÇÃO DE SENHA
============================================================================ -->
<script>
// Função principal: valida campos, envia nova senha para API e gerencia feedback
async function resetar() {
  // Captura valores dos campos de email e nova senha
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("msg");

  // Validação básica: ambos os campos são obrigatórios
  if (!email || !senha) {
    msg.innerText = "Preencha todos os campos";
    return;
  }

  try {
    // Requisição POST para endpoint de reset com corpo JSON e headers apropriados
    const res = await fetch("/reset-password", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, novaSenha: senha })
    });

    const data = await res.json();

    // Tratamento de erro: exibe mensagem retornada pela API ou genérica
    if (!res.ok) {
      msg.innerText = data.error || "Erro ao atualizar";
      return;
    }

    // Sucesso: exibe confirmação e redireciona para login após breve delay
    msg.innerText = "Senha atualizada!";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);

  } catch (err) {
    // Tratamento de exceção de rede ou servidor indisponível
    msg.innerText = "Erro ao conectar com o servidor";
  }
}
</script>

<!-- ============================================================================
  ANIMAÇÃO DE FUNDO: CANVAS COM PARTÍCULAS FLUTUANTES
  Mantém consistência visual com outras páginas do sistema
============================================================================ -->
<script>
// Configuração do canvas para animação de partículas
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

// Define dimensões do canvas conforme tamanho da janela
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Array para armazenar objetos que representam as partículas
let particles = [];

// Inicializa 80 partículas com posição, tamanho e velocidade aleatórios
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5
  });
}

// Loop de animação: limpa canvas, atualiza posição das partículas e redesenha
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    // Inverte direção ao atingir bordas do canvas para efeito de quique suave
    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#f59e0b";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

// Inicia o loop de animação
animate();

// Ajusta dimensões do canvas ao redimensionar a janela
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
